stages:
  - docker
  - build

variables:
  CONAN_SYSREQUIRES_MODE: "enabled"
  # Conan 2 uses CONAN_HOME; point it inside the project dir so GitLab can cache it
  CONAN_HOME: "$CI_PROJECT_DIR/.conan2"
  # Needed on ubuntu-24.04 images where PEP 668 blocks system-wide pip installs
  PIP_BREAK_SYSTEM_PACKAGES: "1"
  DEBIAN_FRONTEND: "noninteractive"

# ──────────────────────────────────────────────────────────────────────────────
# Docker image builds
# ──────────────────────────────────────────────────────────────────────────────
.docker-build:
  stage: docker
  allow_failure: true
  image: docker:latest
  services:
    - name: docker:dind
      command: ["--tls=false"]
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_VERIFY: "0"
  before_script:
    # Wait up to 30 s for the Docker daemon to be ready, then fail clearly
    - timeout 30 sh -c 'until docker info > /dev/null 2>&1; do sleep 1; done' || (echo "Docker daemon did not start. Is the runner configured with privileged=true?"; exit 1)

docker:ci-image:
  extends: .docker-build
  script:
    - cd docker && DOCKER_BUILDKIT=1 docker build --target cpp-docker-ci --build-arg CI_USER=ci -t cpp_ci_env:latest .

docker:dev-image:
  extends: .docker-build
  script:
    - cd docker && DOCKER_BUILDKIT=1 docker build --target cpp-docker-dev --build-arg DEV_USER=dev -t cpp_dev_env:latest .

docker:devcontainer:
  extends: .docker-build
  script:
    - cd .devcontainer && DOCKER_BUILDKIT=1 docker build -t devcontainer:latest .

# ──────────────────────────────────────────────────────────────────────────────
# Shared templates
# ──────────────────────────────────────────────────────────────────────────────

# Base template for all Linux build jobs.
# Installs common build tools and conan, and caches conan/pip/ccache artefacts
# keyed on the content of conanfile.py.
.linux-base:
  stage: build
  cache:
    key:
      files:
        - conanfile.py
      prefix: "$CI_JOB_NAME"
    paths:
      - .conan2/
      - .cache/pip/
      - .ccache/
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq python3 python3-pip python3-venv cmake ninja-build git wget ccache lsb-release
    - python3 -m venv /opt/conan-venv
    - /opt/conan-venv/bin/pip install --upgrade pip setuptools conan
    - export PATH="/opt/conan-venv/bin:$PATH"

.linux-24:
  extends: .linux-base
  image: ubuntu:24.04

.linux-22:
  extends: .linux-base
  image: ubuntu:22.04

# ──────────────────────────────────────────────────────────────────────────────
# Linux — GCC 10–14 and Clang 16–19 (ubuntu-24.04), C++17 and C++20
# ──────────────────────────────────────────────────────────────────────────────
build:linux:
  extends: .linux-24
  parallel:
    matrix:
      - COMPILER_PRESET: gcc-13
        COMPILER_PKGS: "gcc-13 g++-13 lib32gcc-13-dev gcc-multilib"
        CXX: ["20"]
      - COMPILER_PRESET: gcc-14
        COMPILER_PKGS: "gcc-14 g++-14 lib32gcc-14-dev gcc-multilib"
        CXX: ["20"]
      - COMPILER_PRESET: clang-16
        COMPILER_PKGS: "clang-16 llvm-16"
        CXX: ["20"]
      - COMPILER_PRESET: clang-17
        COMPILER_PKGS: "clang-17 llvm-17"
        CXX: ["20"]
      - COMPILER_PRESET: clang-18
        COMPILER_PKGS: "clang-18 llvm-18"
        CXX: ["20"]
      - COMPILER_PRESET: clang-19
        COMPILER_PKGS: "clang-19 llvm-19"
        CXX: ["20"]
  script:
    - bash -c "$(wget -O - https://apt.llvm.org/llvm.sh)"
    - apt-get install -y $COMPILER_PKGS
    - cmake --preset unixlike-$COMPILER_PRESET-debug -DCXX_STANDARD=$CXX
    - cmake --build --preset build-unixlike-$COMPILER_PRESET-debug
    - ctest --preset test-unixlike-$COMPILER_PRESET-debug

# ──────────────────────────────────────────────────────────────────────────────
# Linux — Clang 12–15 (ubuntu-22.04), C++17 only
# See: https://github.com/actions/runner-images/issues/8659
# ──────────────────────────────────────────────────────────────────────────────
build:linux-clang-legacy:
  extends: .linux-22
  parallel:
    matrix:
      - COMPILER_PRESET: clang-15
        COMPILER_PKGS: "clang-15 llvm-15"
  script:
    - bash -c "$(wget -O - https://apt.llvm.org/llvm.sh)"
    - apt-get install -y $COMPILER_PKGS
    - cmake --preset unixlike-$COMPILER_PRESET-debug -DCXX_STANDARD=17
    - cmake --build --preset build-unixlike-$COMPILER_PRESET-debug
    - ctest --preset test-unixlike-$COMPILER_PRESET-debug

# ──────────────────────────────────────────────────────────────────────────────
# Static analysis — Clang 19 with clang-tidy, cppcheck and IWYU (ubuntu-24.04)
# ──────────────────────────────────────────────────────────────────────────────
build:linux-static-analysis:
  extends: .linux-24
  parallel:
    matrix:
      - CXX: ["20"]
  variables:
    COMPILER_PRESET: clang-19
    IWYU_BRANCH: clang_19
    LLVM_PREFIX: /usr/lib/llvm-19
  script:
    - bash -c "$(wget -O - https://apt.llvm.org/llvm.sh)"
    - apt-get install -y clang-19 llvm-19 llvm-19-dev libclang-19-dev cppcheck
    # Build and install include-what-you-use
    - mkdir iwyu && cd iwyu
    - git clone https://github.com/include-what-you-use/include-what-you-use.git
    - cd include-what-you-use && git checkout $IWYU_BRANCH && cd ..
    - mkdir build && cd build
    - cmake -G "Ninja" -DCMAKE_PREFIX_PATH=$LLVM_PREFIX ../include-what-you-use
    - ninja && ninja install
    - cd $CI_PROJECT_DIR
    - cmake --preset unixlike-$COMPILER_PRESET-debug-static-analysis -DCXX_STANDARD=$CXX
    - cmake --build --preset build-unixlike-$COMPILER_PRESET-debug-static-analysis

# ──────────────────────────────────────────────────────────────────────────────
# ARM cross-compilation (ubuntu-24.04), debug + release, C++17 and C++20
# ──────────────────────────────────────────────────────────────────────────────
build:linux-cross-armv7:
  extends: .linux-24
  parallel:
    matrix:
      - BUILD_TYPE: ["debug", "release"]
        CXX: ["20"]
  script:
    - >
      wget -O /tmp/arm-toolchain.tar.xz
      "https://developer.arm.com/-/media/Files/downloads/gnu/14.2.rel1/binrel/arm-gnu-toolchain-14.2.rel1-x86_64-arm-none-eabi.tar.xz"
    - echo "62a63b981fe391a9cbad7ef51b17e49aeaa3e7b0d029b36ca1e9c3b2a9b78823  /tmp/arm-toolchain.tar.xz" | sha256sum -c
    - tar xf /tmp/arm-toolchain.tar.xz -C /opt
    - cmake --preset gcc-arm-$BUILD_TYPE -DCXX_STANDARD=$CXX
    - cmake --build --preset build-gcc-arm-$BUILD_TYPE

# ──────────────────────────────────────────────────────────────────────────────
# Fuzzing — Clang 19 with libFuzzer (ubuntu-24.04)
# ──────────────────────────────────────────────────────────────────────────────
build:linux-fuzzing:
  extends: .linux-24
  variables:
    COMPILER_PRESET: clang-19
  script:
    - bash -c "$(wget -O - https://apt.llvm.org/llvm.sh)"
    - apt-get install -y clang-19 llvm-19
    - cmake --preset unixlike-$COMPILER_PRESET-debug
    - cmake --build --preset build-unixlike-$COMPILER_PRESET-debug

# ──────────────────────────────────────────────────────────────────────────────
# Qt — Clang 18 (ubuntu-24.04), C++20
# ──────────────────────────────────────────────────────────────────────────────
build:linux-qt:
  extends: .linux-24
  variables:
    COMPILER_PRESET: clang-18-qt
  script:
    - bash -c "$(wget -O - https://apt.llvm.org/llvm.sh)"
    - |
      apt-get install -y \
        clang ninja-build build-essential ccache \
        clang-18 llvm-18 llvm-18-dev llvm-18-linker-tools llvm-18-tools llvm-18-runtime \
        libx11-xcb-dev libfontenc-dev libice-dev libsm-dev libxaw7-dev \
        libxcomposite-dev libxcursor-dev libxdamage-dev libxext-dev libxfixes-dev \
        libxi-dev libxinerama-dev libxkbfile-dev libxmu-dev libxmuu-dev libxpm-dev \
        libxrandr-dev libxrender-dev libxres-dev libxss-dev libxt-dev libxtst-dev \
        libxv-dev libxxf86vm-dev libxcb-render0-dev libxcb-render-util0-dev \
        libxcb-xkb-dev libxcb-icccm4-dev libxcb-image0-dev libxcb-keysyms1-dev \
        libxcb-randr0-dev libxcb-shape0-dev libxcb-sync-dev libxcb-xfixes0-dev \
        libxcb-xinerama0-dev libxcb-dri3-dev uuid-dev libxcb-cursor-dev \
        libxcb-util-dev libxcb-util0-dev libx11-xcb1 libx11-dev libgl-dev \
        libgl1-mesa-dev libxcb-glx0-dev libxcb-dri2-0-dev libxcb-present-dev \
        libxcb-composite0-dev libxcb-ewmh-dev libxcb-res0-dev
    - cmake --preset $COMPILER_PRESET -DCXX_STANDARD=20
    - cmake --build --preset build-$COMPILER_PRESET
    - ctest --preset test-$COMPILER_PRESET
